<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">TraceCode Banner</title>
  <desc id="desc">TraceCode product banner with workflow and visualization motif.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101f" />
      <stop offset="100%" stop-color="#102448" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a335f" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#0f1f3a" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20d4ff" />
      <stop offset="100%" stop-color="#4cf0b5" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="1340" cy="130" r="260" fill="#24d2ff" opacity="0.12" />
  <circle cx="1430" cy="770" r="320" fill="#3ff0b8" opacity="0.1" />

  <rect x="110" y="118" width="1380" height="664" rx="34" fill="url(#panel)" stroke="#3ad9ff" stroke-opacity="0.35" />

  <text x="190" y="242" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="64" font-weight="700" fill="#f7fbff">TraceCode</text>
  <text x="190" y="300" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="32" fill="#b7d6f6">Guided algorithm prep with step-by-step execution tracing</text>

  <g transform="translate(190,360)">
    <rect width="540" height="324" rx="20" fill="#0d1e3c" stroke="#2ccff6" stroke-opacity="0.35" />
    <text x="26" y="44" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="23" fill="#7edfff">Workflow</text>
    <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="20" fill="#d7e9ff">
      <text x="26" y="90">1. Pattern Selection</text>
      <text x="26" y="130">2. Approach Comparison</text>
      <text x="26" y="170">3. Edge-Case Planning</text>
      <text x="26" y="210">4. Execution Tracing</text>
      <text x="26" y="250">5. Coding Checkpoints</text>
      <text x="26" y="290">6. Completion Review</text>
    </g>
  </g>

  <g transform="translate(776,360)">
    <rect width="620" height="324" rx="20" fill="#0d1e3c" stroke="#4cf0b5" stroke-opacity="0.4" />
    <text x="26" y="44" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="23" fill="#95f8d1">Runtime Visualizer</text>

    <rect x="24" y="74" width="162" height="104" rx="12" fill="#13294f" />
    <text x="38" y="102" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#d7e9ff">Array</text>
    <rect x="38" y="118" width="30" height="30" rx="6" fill="#20d4ff" /><text x="49" y="139" font-family="ui-monospace, monospace" font-size="13" fill="#03203d">7</text>
    <rect x="72" y="118" width="30" height="30" rx="6" fill="#44e5bf" /><text x="83" y="139" font-family="ui-monospace, monospace" font-size="13" fill="#03203d">1</text>
    <rect x="106" y="118" width="30" height="30" rx="6" fill="#20d4ff" /><text x="117" y="139" font-family="ui-monospace, monospace" font-size="13" fill="#03203d">4</text>

    <rect x="204" y="74" width="186" height="104" rx="12" fill="#13294f" />
    <text x="218" y="102" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#d7e9ff">Hash Map</text>
    <text x="218" y="130" font-family="ui-monospace, monospace" font-size="14" fill="#9bd7ff">sum: 12</text>
    <text x="218" y="154" font-family="ui-monospace, monospace" font-size="14" fill="#9bd7ff">seen: {2, 5, 7}</text>

    <rect x="410" y="74" width="186" height="104" rx="12" fill="#13294f" />
    <text x="424" y="102" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#d7e9ff">Call Stack</text>
    <text x="424" y="130" font-family="ui-monospace, monospace" font-size="14" fill="#9bd7ff">dfs(node=3)</text>
    <text x="424" y="154" font-family="ui-monospace, monospace" font-size="14" fill="#9bd7ff">dfs(node=5)</text>

    <path d="M 106 226 C 180 190, 260 190, 344 226" stroke="#20d4ff" stroke-width="3" fill="none" />
    <circle cx="106" cy="226" r="8" fill="#20d4ff" />
    <circle cx="344" cy="226" r="8" fill="#20d4ff" />

    <path d="M 344 226 C 418 264, 490 264, 570 226" stroke="#4cf0b5" stroke-width="3" fill="none" />
    <circle cx="570" cy="226" r="8" fill="#4cf0b5" />
  </g>

  <rect x="190" y="720" width="1206" height="2" fill="url(#accent)" opacity="0.65" />
</svg>
