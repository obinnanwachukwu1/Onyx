<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">TraceCode Logo</title>
  <desc id="desc">A square logo with TC monogram.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1324" />
      <stop offset="100%" stop-color="#14294d" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20d4ff" />
      <stop offset="100%" stop-color="#4cf0b5" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <rect x="96" y="96" width="320" height="320" rx="72" fill="none" stroke="url(#accent)" stroke-width="18" />
  <text x="256" y="305" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="172" font-weight="700" fill="#f5fbff">TC</text>
</svg>
